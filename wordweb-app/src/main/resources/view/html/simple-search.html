<!DOCTYPE html>
<html th:lang="${uilang}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="common-app :: common_header(~{::title},~{::links}, simpleSearch, #{search.title(${searchWordValue})})">
<title th:text="#{search.title(${searchWordValue})}">Otsing</title>
<th:block th:fragment="links">
  <script type="text/javascript" th:src="@{/view/js/shared.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/recorder.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/ww-common-audio.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/ww-common-search.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/ww-search.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/ww-horizontal-scroll-panel.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/ww-clipboard.js}"></script>
</th:block>
</head>
<body class="survey-active">
  <div>
    <th:block th:replace="common-app :: wcag-search"></th:block>
    <th:block th:replace="common-app :: wcag-main"></th:block>
    <th:block th:replace="common-app :: aria-live-announcer"></th:block>
  </div>
  <th:block th:replace="common-app :: header(pageContext = 'simpleSearch')"></th:block>
  <div class="container-fluid homonym-page mb-5">
    <div class="search-results-header">
      <div class="d-flex align-items-center">
        <th:block th:replace="common-search :: lang-filter"></th:block>
      </div>
    </div>
    <main id="mainContentArea" role="main" class="content-panel loading">
      <!-- 
      <div th:if="${searchResult.resultExists}" class="loading-indicator">
        <div class="spinner-border text-primary " role="status">
          <span class="sr-only">Loading...</span>
        </div>
      </div>
       -->
      <th:block th:replace="common-search :: homonyms"></th:block>
      <div id="word-details" th:if="${searchResult}">
        <div th:if="${searchResult.resultExists}">
          <input id="selected-word-homonym-nr" type="hidden" th:value="${searchResult.selectedWordData.word.homonymNr}">
          <input id="selected-word-lang" type="hidden" th:value="${searchResult.selectedWordData.word.lang}">
          <div class="py-2" th:text="#{label.lexeme.not.found}" th:unless="${searchResult.selectedWordData.relevantDataExists}">Soovitud keeltes tulemusi ei leidu</div>
          <div class="word-results" th:if="${searchResult.selectedWordData.relevantDataExists}">
            <div>
              <th:block th:replace="common-search :: word-data"></th:block>
              <th:block th:if="${searchResult.selectedWordData.lexemesExist}">
                <th:block th:if="${not #lists.isEmpty(searchResult.selectedWordData.lexLexemes)}">
                  <div class="d-flex align-items-end flex-wrap gap-2">
                    <div class="d-flex mr-auto mt-4">
                      <h2 class="search__pre-block-title search__pre-block-title--no-bottom-margin" th:text="#{lexdata.title}"></h2>
                      <th:block th:replace="common-app :: clipboard(
                          word=${searchResult.selectedWordData.word},
                          text=${#messages.msg('label.clipboard.text.lite')},
                          link=${searchResult.selectedWordData.word.lexSearchUrl},
                          date=${#dates.format(#dates.createNow(), 'dd.MM.yyyy')},
                          id=${searchResult.selectedWordData.word.wordId})">
                      </th:block>
                    </div>
                    <div class="text-caption text-darker-gray">
                      <span th:text="#{label.tooltip.last_modified}"></span>
                      <span th:text="${#temporals.format(searchResult.selectedWordData.word.manualEventOn, 'dd.MM.yyyy')}" th:if="${searchResult.selectedWordData.word.manualEventOn}"></span>
                    </div>
                  </div>
                  <div class="search__block search__block--unified">
                    <th:block th:replace="common-search :: lex-detail-view-simple"></th:block>
                  </div>
                </th:block>
              </th:block>
            </div>
            <div>
              <th:block th:replace="common-search-sidebar :: paradigms"></th:block>
              <th:block th:replace="common-search-sidebar :: word-relations"></th:block>
              <th:block th:replace="common-search-sidebar :: keelenou"></th:block>
              <div class="search__sidebar-block search__block text-body-two" th:if="${searchResult.selectedWordData.estHeadword}">
                <div id="corp" th:text="#{label.corp.search}">Otsin veebilauseid ...</div>
              </div>
              <div class="search__sidebar-block search__block text-body-two" th:if="${searchResult.selectedWordData.estHeadword && searchResult.selectedWordData.rusContent}">
                <div id="corpTrans" th:text="#{label.corp.translations.search}">Otsin tõlgitud näiteid ...</div>
              </div>
              <div class="search__sidebar-block search__block text-body-two" th:if="${searchResult.selectedWordData.skellCompatible}">
                <section th:replace="common-search-sidebar :: skell-search-link"></section>
              </div>
            </div>
          </div>
          <script th:inline="javascript">
            var currentWord = /*[[${searchResult.selectedWordData.word.value}]]*/'';
            var currentWordId = /*[[${searchResult.selectedWordData.word.wordId}]]*/'';
            var currentWordLang = /*[[${searchResult.selectedWordData.word.lang}]]*/'';
            var currentWordPosCodes = /*[[${searchResult.selectedWordData.word.summarisedPosCodesStr}]]*/'';
          </script>
        </div>
        <div class="no-results__wrapper" th:unless="${searchResult.resultExists}">
          <th:block th:if="${searchResult.validSearch}">
            <h1 class="no-results__title">
              <span th:text="#{label.search.word.not.found(${searchWordValue}, ${searchResult.formResultExists ? ',' : ''})}"></span>
              <th:block th:if="${searchResult.formResultExists}">
                <span th:text="${searchResult.suggestedWordValues.size() > 1 
                  ? #messages.msg('label.suggest.form.plural') 
                  : #messages.msg('label.suggest.form.single')}">see on ka vorm sõnast</span>
                <th:block th:each="wordValue, wordIter : ${searchResult.suggestedWordValues}">
                  <a th:href="@{${@viewUtil.getSearchUri(sessionBean, searchMode, wordValue)}}" th:text="${wordIter.last ? wordValue : wordValue + ',&nbsp;'}"></a>
                </th:block>
              </th:block>
            </h1>
            <th:block th:if="${searchResult.availableLanguagesDatasets.availableFiltersExist}">
              <div th:text="#{label.search.filter.suggestion.simple}">Otsing annab tulemusi teistes keeltes või sõnakogudes kui sinu valitud filtris.</div>
              <div class="no-results__columns no-results__columns--single" th:with="hasLanguages = ${not #lists.isEmpty(searchResult.availableLanguagesDatasets.languages)}">
                <div th:if="${hasLanguages}">
                  <div th:each="language : ${searchResult.availableLanguagesDatasets.languages}" th:text="${language.value}"></div>
                </div>
              </div>
              <div>
                <a th:href="@{${@viewUtil.getSimpleSearchUri(searchWordValue)}}" th:text="#{label.search.filter.clear}"> Otsi uuesti ilma piiranguteta </a>
              </div>
            </th:block>
            <th:block th:unless="${searchResult.availableLanguagesDatasets.availableFiltersExist}">
              <div th:utext="#{label.word.not.found.simple}">Ei leidnud midagi</div>
              <a th:href="@{${@viewUtil.getDetailSearchUri(searchWordValue)}}" class="text-break" th:text="${searchWordValue}"></a>
            </th:block>
          </th:block>
          <th:block th:unless="${searchResult.validSearch}">
            <h1 class="no-results__title" th:text="#{label.search.word.invalid}"></h1>
          </th:block>
        </div>
      </div>
    </main>
  </div>
  <div th:replace="common-app :: footer-content(pageContext = 'simpleSearch')"></div>
  <script th:inline="javascript">
  	var currentPage = /*[[@{/search/lite}]]*/"/search/lite";
  	var searchWordFragUrl = /*[[@{/searchwordfrag/lite}]]*/"/searchwordfrag/lite";
  	var wordDetailsUrl = /*[[@{/worddetails/lite}]]*/"/worddetails/lite";
  	var newsAcceptUrl = /*[[@{/newsaccept}]]*/"/newsaccept";
  	var morphoUrl = /*[[@{/morpho/lite}]]*/"/morpho/lite";
  	var corpUrl = /*[[@{/corp/simple}]]*/"/corp/simple";
  	var corpTransUrl = /*[[@{/corptrans}]]*/"/corptrans";
  	var speechRecognitionServiceUrl = /*[[${speechRecognitionServiceUrl}]]*/'/';
  	var userPrefUrl = /*[[@{/user-pref}]]*/"/user-pref";
  </script>
</body>
</html>
