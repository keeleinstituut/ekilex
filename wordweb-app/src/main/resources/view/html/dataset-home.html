<!doctype html>
<html lang="et" xmlns:th="http://www.thymeleaf.org">
<head th:replace="common-app :: common_header(_,~{::links},_,_)">
<th:block th:fragment="links">
  <script type="text/javascript" th:src="@{/view/js/shared.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/recorder.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/ww-common-audio.js}"></script>
  <script type="text/javascript" th:src="@{/view/js/ww-common-search.js}"></script>
</th:block>
</head>
<body class="dataset-page">
  <th:block th:replace="common-app :: update-msg"></th:block>
  <th:block th:replace="common-app :: wcag-search"></th:block>
  <th:block th:replace="common-app :: header(withSearch = ${false})"></th:block>
  <section class="dataset-page__wrapper">
    <div class="dataset-page__header">
      <div>
        <img class="dataset-page__image" th:src="${datasetHomeData.dataset.imageUrl}" alt="" th:unless="${#strings.isEmpty(datasetHomeData.dataset.imageUrl)}" />
        <a th:href="|@{/ds}/${datasetHomeData.dataset.code}|" th:text="${datasetHomeData.dataset.name}">Sōnakogu</a>
      </div>
      <div class="dataset-page__header-text" th:if="${showDescription}">
        <span th:text="#{|label.dataset.wordcount.${datasetHomeData.dataset.type}|(${datasetHomeData.dataset.wordCount})}"> Selles sõnakogus on </span>
        <th:block th:if="${datasetHomeData.dataset.lastAnythingTime}">
          <span th:text="#{label.dataset.lastupdate}">Viimati muudetud</span>
          <span th:text="${#temporals.format(datasetHomeData.dataset.lastAnythingTime, 'dd.MM.yyyy')}"></span>
        </th:block>
      </div>
    </div>
    <div th:replace="common-search :: search"></div>
    <ul class="dataset-page__letters" th:if="${datasetHomeData.firstLetters}">
      <li th:each="firstLetter : ${datasetHomeData.firstLetters}">
        <a th:href="@{${@viewUtil.getDatasetFirstLetterSearchUri(datasetHomeData.dataset.code, firstLetter)}}" th:text="${firstLetter}"> </a>
      </li>
    </ul>
    <div class="dataset-page__word-blocks" th:if="${showStat}">
      <div class="dataset-page__word-block">
        <img th:src="@{/view/images/happy-quote-left.svg}" alt="" />
        <div class="dataset-page__word-block-content">
          <h2 th:text="#{label.dataset.createdmeanings.title}"></h2>
          <ul class="dataset-page__word-block-words" th:if="${datasetHomeData.dataset.createdMeaningWords}">
            <li th:each="datasetWord : ${datasetHomeData.dataset.createdMeaningWords}">
              <a th:href="@{${@viewUtil.getDetailSearchUri(datasetWord.value, datasetWord.homonymNr, datasetWord.lang, datasetHomeData.dataset.code)}}" th:utext="${datasetWord.valuePrese}">
              </a>
            </li>
          </ul>
          <div th:unless="${datasetHomeData.dataset.createdMeaningWords}">
            <span th:text="#{label.dataset.createdmeanings.missing}">Viimase kolme aasta jooksul pole uusi mõisteid lisatud.</span>
          </div>
        </div>
      </div>
      <div class="dataset-page__word-block">
        <img th:src="@{/view/images/happy-quote-right.svg}" alt="" />
        <div class="dataset-page__word-block-content">
          <h2 th:text="#{label.dataset.updatedmeanings.title}"></h2>
          <ul class="dataset-page__word-block-words" th:if="${datasetHomeData.dataset.updatedMeaningWords}">
            <li th:each="datasetWord : ${datasetHomeData.dataset.updatedMeaningWords}">
              <a th:href="@{${@viewUtil.getDetailSearchUri(datasetWord.value, datasetWord.homonymNr, datasetWord.lang, datasetHomeData.dataset.code)}}" th:utext="${datasetWord.valuePrese}">
              </a>
            </li>
          </ul>
          <div th:unless="${datasetHomeData.dataset.updatedMeaningWords}">
            <span th:text="#{label.dataset.updatedmeanings.missing}">Viimase kolme aasta jooksul pole mõisteid muudetud.</span>
          </div>
        </div>
      </div>
    </div>
    <p th:text="${datasetHomeData.dataset.description}" class="dataset-page__description" th:if="${showDescription}">Sõnakogu kirjeldus</p>
    <ul class="dataset-page__word-list" th:if="${datasetWords}">
      <li th:each="word : ${datasetWords}">
        <a th:href="@{${@viewUtil.getDetailSearchUri(word, datasetHomeData.dataset.code)}}" th:text="${word}"></a>
      </li>
    </ul>
  </section>
  <div th:replace="common-app :: footer-content"></div>
  <div th:replace="feedback :: feedback-form"></div>
  <script th:inline="javascript">
  	var currentPage = /*[[@{/}]]*/"/";
  	var searchWordFragUrl = /*[[@{/searchwordfrag/unif}]]*/"/searchwordfrag/unif";
  	var wordDetailsUrl = /*[[@{/worddetails/unif}]]*/"/worddetails/unif";
  	var speechRecognitionServiceUrl = /*[[${speechRecognitionServiceUrl}]]*/"/";
  </script>
</body>
</html>
